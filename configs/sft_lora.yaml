# SFT LoRA 训练配置
# 基座模型：Qwen/Qwen2-7B，使用 LoRA 低秩适配

model:
  base_model: "Qwen/Qwen2-7B"
  max_seq_length: 2048
  trust_remote_code: true

lora:
  r: 64
  lora_alpha: 128
  lora_dropout: 0.05
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"
  bias: "none"
  task_type: "CAUSAL_LM"

training:
  output_dir: "./outputs/sft_lora"
  num_train_epochs: 3
  per_device_train_batch_size: 4
  per_device_eval_batch_size: 4
  gradient_accumulation_steps: 8
  learning_rate: 2.0e-4
  warmup_ratio: 0.05
  lr_scheduler_type: "cosine"
  weight_decay: 0.01
  max_grad_norm: 1.0
  fp16: false
  bf16: true
  logging_steps: 10
  eval_steps: 100
  save_steps: 200
  save_total_limit: 3
  load_best_model_at_end: true
  metric_for_best_model: "eval_loss"
  dataloader_num_workers: 4
  remove_unused_columns: false
  report_to: "wandb"
  optim: "adamw_torch"

wandb:
  project: "ecommerce-post-training"
  run_name: "sft_lora_qwen2_7b"
  tags:
    - "sft"
    - "lora"
    - "qwen2-7b"

data:
  train_file: "data/processed/train.jsonl"
  eval_file: "data/processed/eval.jsonl"
  text_field: "text"
