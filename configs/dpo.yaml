# DPO 训练配置
# 基于 SFT checkpoint 进行 Direct Preference Optimization

model:
  base_model: "Qwen/Qwen2-7B"
  sft_checkpoint: "./outputs/sft_lora/checkpoint-best"
  max_seq_length: 2048
  trust_remote_code: true

lora:
  r: 32
  lora_alpha: 64
  lora_dropout: 0.05
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"
  bias: "none"
  task_type: "CAUSAL_LM"

dpo:
  beta: 0.1
  max_length: 2048
  max_prompt_length: 1024
  max_target_length: 1024
  loss_type: "sigmoid"
  label_smoothing: 0.0
  reference_free: false

training:
  output_dir: "./outputs/dpo"
  num_train_epochs: 1
  per_device_train_batch_size: 2
  per_device_eval_batch_size: 2
  gradient_accumulation_steps: 8
  learning_rate: 5.0e-7
  warmup_ratio: 0.1
  lr_scheduler_type: "linear"
  weight_decay: 0.0
  max_grad_norm: 1.0
  bf16: true
  logging_steps: 10
  eval_steps: 100
  save_steps: 200
  save_total_limit: 2
  load_best_model_at_end: true
  metric_for_best_model: "eval_rewards/accuracies"
  greater_is_better: true
  remove_unused_columns: false
  report_to: "wandb"

wandb:
  project: "ecommerce-post-training"
  run_name: "dpo_qwen2_7b"
  tags:
    - "dpo"
    - "qwen2-7b"
    - "preference"

data:
  train_file: "data/processed/preference_train.jsonl"
  eval_file: "data/processed/preference_eval.jsonl"
